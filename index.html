<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="olive1012のウェブサイト">
    <title>My Website - olive1012</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .secondary-btn {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .secondary-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .content {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }
        
        .feature {
            display: inline-block;
            margin: 15px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            flex: 1;
            min-width: 200px;
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 My Website</h1>
        <p class="subtitle">olive1012 のウェブサイトへようこそ</p>
        
        <p>GitHub Pages で構築したあなたのウェブサイトです。<br>このページをカスタマイズしてあなたのポートフォリオを作成しましょう！</p>
        
        <div class="button-group">
            <button onclick="alert('編集ボタンがクリックされました！')">✏️ 編集する</button>
            <button class="secondary-btn" onclick="window.open('https://github.com/olive1012/My-website', '_blank')">📘 GitHub リポジトリ</button>
        </div>
        
        <div class="content">
            <h2 style="color: #333; margin-bottom: 30px;">🎯 次のステップ</h2>
            
            <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                <div class="feature">
                    <h3>1️⃣ 設定</h3>
                    <p>Settings → Pages から GitHub Pages を有効にしましょう</p>
                </div>
                <div class="feature">
                    <h3>2️⃣ カスタマイズ</h3>
                    <p>このファイルを編集してあなたのコンテンツを追加しましょう</p>
                </div>
                <div class="feature">
                    <h3>3️⃣ 公開</h3>
                    <p>変更をコミットして、あなたのサイトを世界に公開しましょう</p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2026 olive1012 | Built with GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
